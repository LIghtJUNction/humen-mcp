name: Publish AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "aur/humen-mcp-git/**"
      - "packaging/**"
      - "scripts/package-release.sh"
      - ".github/workflows/aur.yml"
  workflow_dispatch:
    inputs:
      package:
        description: "AUR package to publish"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - humen-mcp-bin
          - humen-mcp-git
      version:
        description: "Package version, e.g. 0.1.5, or auto to use Cargo.toml/release tag"
        required: false
        default: "auto"
        type: string

permissions:
  contents: read

concurrency:
  group: aur-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish AUR packages
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    env:
      AUR_GIT_AUTHOR_NAME: LIghtJUNction
      AUR_GIT_AUTHOR_EMAIL: LIghtJUNction@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve publish plan
        id: plan
        shell: bash
        env:
          DISPATCH_PACKAGE: ${{ github.event.inputs.package }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          publish_bin=false
          publish_git=false
          version="${cargo_version}"

          case "${GITHUB_EVENT_NAME}" in
            workflow_run)
              publish_bin=true
              publish_git=true
              ;;
            release)
              publish_bin=true
              publish_git=true
              version="${RELEASE_TAG#v}"
              ;;
            push)
              publish_git=true
              ;;
            workflow_dispatch)
              case "${DISPATCH_PACKAGE:-both}" in
                both)
                  publish_bin=true
                  publish_git=true
                  ;;
                humen-mcp-bin)
                  publish_bin=true
                  ;;
                humen-mcp-git)
                  publish_git=true
                  ;;
                *)
                  echo "Unsupported package selection: ${DISPATCH_PACKAGE}" >&2
                  exit 1
                  ;;
              esac

              requested="${DISPATCH_VERSION:-auto}"
              if [[ -n "${requested}" && "${requested}" != "auto" ]]; then
                version="${requested#v}"
              fi
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${version}" || "${version}" == v* ]]; then
            echo "Invalid version: ${version}" >&2
            exit 1
          fi

          {
            echo "publish_bin=${publish_bin}"
            echo "publish_git=${publish_git}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

          echo "publish_bin=${publish_bin}"
          echo "publish_git=${publish_git}"
          echo "version=${version}"

      - name: Checkout AUR package submodules
        if: steps.plan.outputs.publish_bin == 'true' || steps.plan.outputs.publish_git == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config submodule.aur/humen-mcp-bin.url https://aur.archlinux.org/humen-mcp-bin.git
          git config submodule.aur/humen-mcp-git.url https://aur.archlinux.org/humen-mcp-git.git
          git submodule update --init aur/humen-mcp-bin aur/humen-mcp-git

      - name: Prepare humen-mcp-bin package
        if: steps.plan.outputs.publish_bin == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail

          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/humen-mcp-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          checksum="$(curl -fsSL "${asset_url}" | sha256sum | awk '{print $1}')"
          current_pkgver="$(sed -nE 's/^pkgver=([^[:space:]]+)/\1/p' aur/humen-mcp-bin/PKGBUILD | head -n1)"
          current_pkgrel="$(sed -nE 's/^pkgrel=([0-9]+)/\1/p' aur/humen-mcp-bin/PKGBUILD | head -n1)"
          if [[ "${current_pkgver}" == "${VERSION}" && "${current_pkgrel}" =~ ^[0-9]+$ ]]; then
            pkgrel="$((current_pkgrel + 1))"
          else
            pkgrel=1
          fi

          sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" aur/humen-mcp-bin/PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=${pkgrel}/" aur/humen-mcp-bin/PKGBUILD
          sed -i -E "s/^sha256sums=\('.*'\)/sha256sums=('${checksum}')/" aur/humen-mcp-bin/PKGBUILD

      - name: Prepare humen-mcp-git package
        id: prepare_git
        if: steps.plan.outputs.publish_git == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail

          commit_count="$(git rev-list --count HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          git_pkgver="${VERSION}.r${commit_count}.g${short_sha}"

          sed -i -E "s/^pkgver=.*/pkgver=${git_pkgver}/" aur/humen-mcp-git/PKGBUILD
          sed -i -E "s/printf '[0-9]+\\.[0-9]+\\.[0-9]+\\.r%s\\.g%s'/printf '${VERSION}.r%s.g%s'/" aur/humen-mcp-git/PKGBUILD
          echo "git_pkgver=${git_pkgver}" >> "${GITHUB_OUTPUT}"

      - name: Publish humen-mcp-bin to AUR
        if: steps.plan.outputs.publish_bin == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: humen-mcp-bin
          pkgbuild: aur/humen-mcp-bin/PKGBUILD
          assets: |
            aur/humen-mcp-bin/humen-mcp.install
          commit_username: ${{ env.AUR_GIT_AUTHOR_NAME }}
          commit_email: ${{ env.AUR_GIT_AUTHOR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update humen-mcp-bin to ${{ steps.plan.outputs.version }}
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Publish humen-mcp-git to AUR
        if: steps.plan.outputs.publish_git == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: humen-mcp-git
          pkgbuild: aur/humen-mcp-git/PKGBUILD
          assets: |
            aur/humen-mcp-git/humen-mcp.install
          commit_username: ${{ env.AUR_GIT_AUTHOR_NAME }}
          commit_email: ${{ env.AUR_GIT_AUTHOR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update humen-mcp-git to ${{ steps.prepare_git.outputs.git_pkgver }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
